name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Trusted publisher target — must match the environment configured on
    # npmjs.com under @alexbruf/wasmkernel → Trusted Publishers. Add
    # protection rules (required reviewers, branch restrictions, wait
    # timer) on this environment in repo Settings if you want extra gates.
    environment: release

    permissions:
      contents: read
      id-token: write   # OIDC token for npm trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x. Crossing the npm 10→11
          # boundary via global self-upgrade hits a known
          # MODULE_NOT_FOUND on promise-retry that --force doesn't
          # fix (verified on Node 22 in earlier publish runs).
          # Staying on Node 24 keeps the upgrade intra-major.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to latest 11.x (>= 11.5.1 for trusted publishing)
        run: npm install -g npm@latest --force

      - name: Install binaryen (for wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Cache wasi-sdk
        id: wasi-sdk-cache
        uses: actions/cache@v4
        with:
          path: /tmp/wasi-sdk-25.0-x86_64-linux
          key: wasi-sdk-25.0-x86_64-linux

      - name: Install wasi-sdk
        if: steps.wasi-sdk-cache.outputs.cache-hit != 'true'
        run: ./scripts/install-wasi-sdk.sh

      - name: Export WASI_SDK_PATH
        run: echo "WASI_SDK_PATH=/tmp/wasi-sdk-25.0-x86_64-linux" >> "$GITHUB_ENV"

      - name: Build kernel
        run: ./scripts/build-kernel.sh

      - name: Build guest tests
        run: ./scripts/build-guests.sh

      - name: Sync kernel into package
        run: ./scripts/sync-package.sh

      - name: Run full test suite (gate on green)
        run: bun test tests/wasmkernel.test.ts

      - name: Verify package version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./packages/wasmkernel/package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi
          echo "publishing version $pkg"

      - name: Publish to npm (trusted publisher via OIDC)
        working-directory: packages/wasmkernel
        # No NODE_AUTH_TOKEN — npm 11+ negotiates auth with the registry
        # via the GitHub OIDC token (id-token: write above) and the
        # trusted publisher configuration on npmjs.com. --provenance
        # generates the sigstore attestation in the same flow.
        run: npm publish --provenance --access public
