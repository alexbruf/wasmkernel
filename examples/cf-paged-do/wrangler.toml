name = "wasmkernel-paged-do"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# The Durable Object hosts the wasmkernel instance + paged guest memory
# backed by the DO's sync SQLite storage (10 GB, μs-latency). Cold pages
# live in SQLite; the hot window is bounded at 800 pages (50 MB) so the
# isolate stays well under CF's 128 MB cap even when the guest's
# declared initial memory is 64 MB (rolldown-sized).

[[durable_objects.bindings]]
name = "BUNDLER"
class_name = "BundlerDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BundlerDO"]
